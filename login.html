<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: var(--bg-base);
            background-image: radial-gradient(circle at top left, #1e1b4b, #0f172a 60%);
            color: var(--text-main);
        }

        .auth-box { 
            background: var(--bg-card); 
            padding: 40px; 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            width: 320px; 
        }

        .auth-box h2 {
            text-align: center;
            margin-top: 0;
            font-weight: 700;
            margin-bottom: 25px;
        }

        input { 
            width: 100%; 
            padding: 12px 15px; 
            margin: 10px 0 20px 0; 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 8px; 
            box-sizing: border-box;
            color: white;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        button { 
            width: 100%; 
            padding: 12px; 
            background: linear-gradient(135deg, var(--accent), #6366f1);
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s, opacity 0.3s; 
        }

        button:hover { 
            opacity: 0.9;
            transform: scale(1.02);
        }

        .error { color: var(--danger); font-size: 0.85em; text-align: center; margin-bottom: 15px; }
        
        .link { text-align: center; margin-top: 20px; font-size: 0.9em; color: #94a3b8; }
        .link a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-box">
        <h2>Welcome Back</h2>
        
        {% with messages = get_flashed_messages(category_filter=["error"]) %}
            {% if messages %}<p class="error">{{ messages[0] }}</p>{% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        
        <div class="link">
            New user? <a href="{{ url_for('register') }}">Register here</a>
        </div>
    </div>
</body>
</html>
